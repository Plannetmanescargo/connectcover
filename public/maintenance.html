<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Back soon — Coverza</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      img { height: 28px; width: auto; margin-bottom: 32px; }
      .pill {
        display: inline-flex; align-items: center; gap: 8px;
        border: 1px solid rgba(108,76,243,0.16);
        background: rgba(108,76,243,0.05);
        padding: 6px 14px; border-radius: 999px;
        font-size: 10.5px; font-weight: 600;
        letter-spacing: 0.20em; text-transform: uppercase;
        color: rgb(108,76,243); margin-bottom: 24px;
      }
      .dot {
        height: 6px; width: 6px; border-radius: 50%;
        background: rgb(108,76,243);
      }
      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800; line-height: 0.95;
        letter-spacing: -0.06em; color: #0f172a;
        margin-bottom: 20px;
      }
      h1 span { color: rgb(108,76,243); }
      p { font-size: 0.95rem; line-height: 1.85; color: #64748b; max-width: 28rem; }
    </style>
  </head>
  <body>
    <img src="https://www.coverza.co.uk/brand/connectcoverbig.png" alt="Coverza" />
    <div class="pill"><span class="dot"></span> Back soon</div>
    <h1>We'll be back<br /><span>very shortly.</span></h1>
    <p>Coverza is temporarily unavailable while we carry out some maintenance. Check back soon.</p>
  </body>
</html>
